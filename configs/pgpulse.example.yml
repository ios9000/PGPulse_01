# PGPulse Configuration
# Copy to pgpulse.yml and adjust for your environment.
# Environment variable overrides: PGPULSE_<SECTION>_<KEY>=value
# Example: PGPULSE_SERVER_LISTEN=:9090  PGPULSE_SERVER_LOG_LEVEL=debug

server:
  listen: ":8080"       # TCP address to listen on (host:port)
  log_level: "info"     # debug | info | warn | error
  cors_enabled: false   # Enable for development with separate Vite dev server
  cors_origin: "http://localhost:5173"  # Allowed origin when CORS is enabled

# PGPulse metadata storage — where PGPulse persists collected metrics.
# Must be a PostgreSQL database (with TimescaleDB extension for hypertables).
storage:
  dsn: "postgres://pgpulse:secret@localhost:5432/pgpulse?sslmode=prefer"
  use_timescaledb: true  # set false for plain PostgreSQL (no hypertables)
  retention_days: 30     # delete metric data older than this many days

# Authentication — JWT-based auth and RBAC.
# When disabled (default), all API endpoints are open (no token required).
# When enabled, a storage DSN is required and jwt_secret must be ≥ 32 characters.
auth:
  enabled: false
  jwt_secret: "change-me-to-at-least-32-characters-long"
  refresh_secret: ""  # separate secret for refresh tokens; defaults to jwt_secret if empty
  access_token_ttl: 24h
  refresh_token_ttl: 168h   # 7 days
  bcrypt_cost: 12
  initial_admin:
    username: "admin"
    password: "changeme"  # hashed on startup; change immediately

# Alerting — threshold-based alert rules with hysteresis.
# When enabled, evaluates collected metrics against rules and fires alerts.
# Requires storage.dsn to be configured.
alerting:
  enabled: false
  default_consecutive_count: 3    # breaches before firing (default hysteresis)
  default_cooldown_minutes: 15    # suppress repeats for this duration
  default_channels: ["email"]     # notification channels for rules without explicit channels
  evaluation_timeout_seconds: 5   # max time per evaluation cycle
  history_retention_days: 30      # delete resolved alerts older than this
  dashboard_url: ""               # base URL for dashboard links in notifications (optional)

  # SMTP email notifications — required when "email" is in default_channels.
  email:
    host: "smtp.example.com"
    port: 587                     # default: 587 (STARTTLS)
    username: ""                  # SMTP username (optional, for authenticated relay)
    password: ""                  # SMTP password
    from: "pgpulse@example.com"
    recipients:
      - "dba-team@example.com"
    tls_skip_verify: false        # skip TLS certificate verification (not recommended)
    send_timeout_seconds: 10      # per-message send timeout

# PostgreSQL instances to monitor.
# Each instance requires a user with the pg_monitor role (never superuser).
# Create with: CREATE USER pgpulse_monitor WITH PASSWORD '...' IN ROLE pg_monitor;
instances:
  - id: "prod-primary"
    dsn: "postgres://pgpulse_monitor:${MONITOR_PASSWORD}@db-primary.example.com:5432/postgres?sslmode=require"
    enabled: true
    intervals:
      high:   10s    # connections, cache, wait events, locks, long transactions
      medium: 60s    # replication, statements, checkpoint, progress collectors
      low:    300s   # server info, database sizes, settings, extensions, IO stats

  - id: "prod-replica"
    dsn: "postgres://pgpulse_monitor:${MONITOR_PASSWORD}@db-replica.example.com:5432/postgres?sslmode=require"
    enabled: true
    # intervals default to 10s / 60s / 300s when omitted

  - id: "staging"
    dsn: "postgres://pgpulse_monitor:secret@db-staging.internal:5432/postgres?sslmode=prefer"
    enabled: false  # disabled instances are skipped at startup

# ML anomaly detection and forecasting.
# When enabled, tracks configured metrics and detects anomalies via STL decomposition.
ml:
  enabled: false
  zscore_threshold_warning: 2.0
  zscore_threshold_critical: 3.0
  anomaly_logic: "or"              # "or" = any metric, "and" = all metrics
  collection_interval: 60s
  forecast:
    horizon: 60            # points ahead; at 60s collection this is 1 hour
    confidence_z: 1.96     # 95% confidence interval
  persistence:
    enabled: true
  metrics:
    - key: "connections.active"
      period: 1440          # seasonal period in data points (1440 = 24h at 60s interval)
      enabled: true
    - key: "cache.hit_ratio"
      period: 1440
      enabled: true
