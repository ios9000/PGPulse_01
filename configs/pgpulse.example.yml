# PGPulse Configuration
# Copy to pgpulse.yml and adjust for your environment.
# Environment variable overrides: PGPULSE_<SECTION>_<KEY>=value
# Example: PGPULSE_SERVER_LISTEN=:9090  PGPULSE_SERVER_LOG_LEVEL=debug

server:
  listen: ":8080"       # TCP address to listen on (host:port)
  log_level: "info"     # debug | info | warn | error

# PGPulse metadata storage — where PGPulse persists collected metrics.
# Must be a PostgreSQL database (with TimescaleDB extension for hypertables).
storage:
  dsn: "postgres://pgpulse:secret@localhost:5432/pgpulse?sslmode=prefer"
  use_timescaledb: true  # set false for plain PostgreSQL (no hypertables)
  retention_days: 30     # delete metric data older than this many days

# Authentication — JWT-based auth and RBAC.
# When disabled (default), all API endpoints are open (no token required).
# When enabled, a storage DSN is required and jwt_secret must be ≥ 32 characters.
auth:
  enabled: false
  jwt_secret: "change-me-to-at-least-32-characters-long"
  access_token_ttl: 24h
  refresh_token_ttl: 168h   # 7 days
  bcrypt_cost: 12
  initial_admin:
    username: "admin"
    password: "changeme"  # hashed on startup; change immediately

# PostgreSQL instances to monitor.
# Each instance requires a user with the pg_monitor role (never superuser).
# Create with: CREATE USER pgpulse_monitor WITH PASSWORD '...' IN ROLE pg_monitor;
instances:
  - id: "prod-primary"
    dsn: "postgres://pgpulse_monitor:${MONITOR_PASSWORD}@db-primary.example.com:5432/postgres?sslmode=require"
    enabled: true
    intervals:
      high:   10s    # connections, cache, wait events, locks, long transactions
      medium: 60s    # replication, statements, checkpoint, progress collectors
      low:    300s   # server info, database sizes, settings, extensions, IO stats

  - id: "prod-replica"
    dsn: "postgres://pgpulse_monitor:${MONITOR_PASSWORD}@db-replica.example.com:5432/postgres?sslmode=require"
    enabled: true
    # intervals default to 10s / 60s / 300s when omitted

  - id: "staging"
    dsn: "postgres://pgpulse_monitor:secret@db-staging.internal:5432/postgres?sslmode=prefer"
    enabled: false  # disabled instances are skipped at startup
